name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker-build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/tdtl-internal-applications/vendor_cicid:latest .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/tdtl-internal-applications/vendor_cicid:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "Changing to deployment directory..."
            cd /home/tdtlserver/projects/Vendor_CICID/Frontend

            echo "Logging into GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u "${{ secrets.GHCR_USERNAME }}" \
              --password-stdin

            echo "Pulling latest Docker image..."
            docker compose pull

            echo "Restarting containers..."
            docker compose up -d

            echo "Removing unused Docker images..."
            docker image prune -f

            echo "Deployment completed successfully."